<!--***************************************************
  BODY
****************************************************-->
<body>
<div id="formModal" class="modal-overlay">
  <div class="modal-content">
    <h2>Contact Us</h2>
    <form id="popupForm" onsubmit="handleForm(event)">
      <label for="gameTag">Gametag:</label>
      <input type="text" id="gameTag" required>
      <br>
      <label for="age">Age:</label>
      <input type="number" id="age" required>
      <br>
      <button type="submit">Submit</button>
    </form>
  </div>
</div>


  <h1 id="indextitle">Pin That Ball!</h1>
  <h2 id="indexsubtitle">+ Geodash</h2>

  <div class="indexbuttons">
    <button onclick="play()">Play</button>
    <br>
    <button id="loginbutton" onclick="fb_login()">Login</button>
    <br>
    <button id="logoutbutton" onclick="fb_logout()">Logout</button>
  </div>
</body>
</html>
