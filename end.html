<!DOCTYPE html>
<html lang="en">
<head>
  <title>Pin that Ball!</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="images/pinballicon.png">
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-analytics.js"></script>
  <!-- firebase end ******************************************-->

  <!-- P5.js & P5.play ***************************************-->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.8.0/addons/p5.sound.js" integrity="sha512-TU9AWtV5uUZPX8dbBAH8NQF1tSdigPRRT82vllAQ1Ke28puiqLA6ZVKxtUGlgrH6yWFnkKy+sE6luNEGH9ar0A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://p5play.org/v3/planck.min.js"></script>
  <script src="https://p5play.org/v3/p5play.js"></script>
  
  <!-- JQUERY ************************************************-->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
 
  <script src="fb_setup.js"></script>
  <script type="module" src="fb_io.js"></script>
  <script src="library.js"></script>
  <script type="module" src="end.js"></script>

</head> 

<div id="formModal" class="modal-overlay">
  <div class="modal-content">
    <span class="close-btn" onclick="closeFormPopup()">&times;</span>
    
    <h2>Contact Us</h2>
    <form id="popupForm" onsubmit="handleFormSubmit(event)">
      <label for="gametag">Gametag:</label>
      <input type="text" id="gametag" required>
      
      <label for="age">Age:</label>
      <input type="number" id="age" required>
      
      <button type="submit">Submit</button>
    </form>
  </div>
</div>
  <header>
    <h1 id="titleend">Game Over</h1>
    <button class="pinbuttons" onclick="location.href='difficulty.html'">Restart</button>
    <button class="pinbuttons" onclick="location.href='library.html'">Home</button>
    <button class="pinbuttons" onclick="submitScore()">Submit highscore to leaderboard!</button>
  </header>
  <body class="pinbody">
    
  </body>
</html>
